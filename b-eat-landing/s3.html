<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>b:eat — S3 Since 2016 Section</title>
<link rel="stylesheet" as="style" crossorigin
  href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; overflow-x: hidden; }
  body { font-family: 'Pretendard', sans-serif; }

  .s3 {
    width: 100%;
    background: linear-gradient(to bottom, #edf5ff, #ffffff);
  }

  .s3 .inner {
    width: 100%;
    max-width: 1400px;
    margin: 0 auto;
    padding: clamp(40px, 5.7vw, 80px) clamp(20px, 4vw, 60px) clamp(16px, 2.1vw, 30px);
  }

  /* Title */
  .s3 .title {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: clamp(10px, 1.6vw, 20px);
    text-align: center;
    max-width: 700px;
    margin: 0 auto;
  }

  .s3 .title .label {
    border: 1px solid #5298dd;
    border-radius: 32px;
    padding: 10px 20px;
    color: #5298dd;
    font-weight: 500;
    font-size: clamp(11px, 0.9vw, 14px);
    text-transform: uppercase;
  }

  .s3 .title h2 {
    color: #1a1a2e;
    font-weight: 800;
    font-size: clamp(24px, 3.2vw, 48px);
    line-height: 1.25;
  }

  .s3 .title h2 .accent {
    color: #5298dd;
  }

  .s3 .title .sub {
    color: #4a4a6a;
    font-weight: 400;
    font-size: clamp(13px, 1.1vw, 20px);
    line-height: 1.5;
  }

  .s3 .timeline {
    margin-top: clamp(8px, 1vw, 14px);
  }

  .s3 .timeline img {
    width: 100%;
    height: auto;
    display: block;
  }
</style>
</head>
<body>

<section class="s3">
  <div class="inner">
    <div class="title">
      <span class="label">b;eat SINCE 2016</span>
      <h2>
        로봇카페 <span class="accent">최초 시작, 최다 설치</span><br />
        전국 330대
      </h2>
      <p class="sub">
        1세대 30대, 2세대 50대, 3세대 200대 이상 Multiple 판매 성장<br />
        (2026.05 기준)
      </p>
    </div>

    <div class="timeline">
      <img src="assets/s3-timeline.png" alt="b:eat 로봇카페 도입 성장 타임라인: 2018년 1.0 출시부터 2025년 누적 330호점까지" />
    </div>
  </div>
</section>

</body>
</html>
