<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>b:eat — S7 Interview Video Section</title>
<link rel="stylesheet" as="style" crossorigin
  href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; overflow-x: hidden; }
  body { font-family: 'Pretendard', sans-serif; background: #1a1a2e; }

  .s7 { width: 100%; background: #1a1a2e; }

  .s7 .inner {
    width: 100%;
    max-width: 1400px;
    margin: 0 auto;
    padding: clamp(40px, 5.7vw, 80px) clamp(20px, 4vw, 60px) clamp(55px, 7.9vw, 110px);
  }

  /* Title */
  .s7 .title {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: clamp(10px, 1.6vw, 20px);
    text-align: center;
  }

  .s7 .title .label {
    border: 1px solid #5298dd;
    border-radius: 32px;
    padding: 10px 20px;
    color: #5298dd;
    font-weight: 500;
    font-size: clamp(11px, 0.9vw, 14px);
    text-transform: uppercase;
  }

  .s7 .title h2 {
    color: #ffffff;
    font-weight: 800;
    font-size: clamp(24px, 3.2vw, 48px);
  }

  /* Video */
  .s7 .video-wrap {
    margin-top: clamp(30px, 4.3vw, 60px);
    width: 100%;
    aspect-ratio: 16 / 9;
    box-shadow: 0px 24px 64px rgba(0, 0, 0, 0.5);
    background: #000000;
  }

  .s7 .video-wrap iframe {
    width: 100%;
    height: 100%;
    display: block;
    border: 0;
  }
</style>
</head>
<body>

<section class="s7">
  <div class="inner">
    <div class="title">
      <span class="label">Interview</span>
      <h2>3 Track Client</h2>
    </div>

    <div class="video-wrap">
      <iframe
        src="https://www.youtube.com/embed/dzPyIsSomkk"
        title="[로봇카페b;eat] [b;eat3X] 더욱 진화된 b;eat 3X"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
        allowfullscreen
      ></iframe>
    </div>
  </div>
</section>

</body>
</html>
