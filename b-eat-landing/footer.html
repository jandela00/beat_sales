<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>b:eat — Footer</title>
<link rel="stylesheet" as="style" crossorigin
  href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; overflow-x: hidden; }
  body { font-family: 'Pretendard', sans-serif; }

  .footer {
    width: 100%;
    background: #151515;
    display: flex;
    align-items: center;
  }

  .footer .inner {
    width: 100%;
    max-width: 1400px;
    margin: 0 auto;
    padding: clamp(24px, 3.6vw, 50px) 0;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 20px;
    flex-wrap: wrap;
  }

  .footer .company {
    display: flex;
    flex-direction: column;
    gap: clamp(16px, 2vw, 24px);
  }

  .footer .company h2 {
    color: #ffffff;
    font-weight: 700;
    font-size: clamp(16px, 1.6vw, 20px);
  }

  .footer .company .details {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .footer .company .details p {
    font-weight: 400;
    font-size: 14px;
    color: #d1d1d1;
  }

  .footer .company .details p b {
    font-weight: 700;
    color: #ffffff;
  }

  .footer .copyright {
    font-weight: 400;
    font-size: 14px;
    color: #999999;
    white-space: nowrap;
  }

  @media (max-width: 720px) {
    .footer .inner {
      flex-direction: column;
      align-items: flex-start;
      gap: 16px;
    }
  }
</style>
</head>
<body>

<footer class="footer">
  <div class="inner">
    <div class="company">
      <h2>주식회사 비트코퍼레이션</h2>
      <div class="details">
        <p><b>대표번호 :</b> 1661-1167&nbsp;&nbsp;|&nbsp;&nbsp;<b>주소 :</b> 경기도 성남시 분당구 황새울로311번길 36, 2층(서현동 261-1)</p>
        <p><b>사업자등록번호 :</b> 235-81-02321&nbsp;&nbsp;|&nbsp;&nbsp;<b>대표이사 :</b> 채윤관</p>
      </div>
    </div>
    <p class="copyright">ⓒ 2026 b;eat corp. All rights reserved.</p>
  </div>
</footer>

</body>
</html>
