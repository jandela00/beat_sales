<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>b:eat — S0 Hero Section</title>
<link rel="stylesheet" as="style" crossorigin
  href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; overflow-x: hidden; }
  body { background: #0d0d1f; font-family: 'Pretendard', sans-serif; }

  /* Section fills 100% of the viewport width; aspect-ratio keeps the
     hero photo proportional on large screens and is dropped on mobile
     so content can grow the section's height instead of clipping it. */
  .s0 {
    position: relative;
    width: 100%;
    aspect-ratio: 1920 / 1080;
    background: #0d0d1f;
    overflow: hidden;
  }

  .s0 .hri-bg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: 60% center;
    pointer-events: none;
  }

  /* Legibility gradient behind the nav/title copy — needed once the
     photo can be cropped differently across screen sizes. */
  .s0 .scrim {
    position: absolute;
    inset: 0;
    background: linear-gradient(100deg, rgba(13, 13, 31, 0.75) 0%, rgba(13, 13, 31, 0.35) 45%, rgba(13, 13, 31, 0) 75%);
  }

  /* Content container: full width, capped at 1400px, centered */
  .s0 .inner {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 1400px;
    height: 100%;
    margin: 0 auto;
    padding: 0;
    display: flex;
    flex-direction: column;
  }

  /* Nav */
  .s0 .nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    row-gap: 12px;
    height: clamp(64px, 6.5vw, 90px);
    flex-shrink: 0;
  }

  .s0 .nav .logo {
    height: clamp(20px, 2vw, 28px);
    width: auto;
    object-fit: contain;
  }

  .s0 .nav .nav-links {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    justify-content: flex-end;
    gap: clamp(14px, 2.5vw, 50px);
  }

  .s0 .nav .nav-links a {
    font-weight: 500;
    font-size: clamp(13px, 1vw, 16px);
    line-height: 20px;
    text-decoration: none;
    white-space: nowrap;
  }

  .s0 .nav .nav-links a:not(.nav-cta) {
    color: #d1d1d1;
    transition: color 0.2s ease;
  }

  .s0 .nav .nav-links a:not(.nav-cta):hover {
    color: #ffffff;
  }

  .s0 .nav .nav-cta {
    background: #5298dd;
    border-radius: 24px;
    padding: 10px 18px;
    color: #ffffff;
    font-weight: 500;
    transition: transform 0.2s ease;
  }

  .s0 .nav .nav-cta:hover {
    color: #ffffff;
    font-weight: 500;
    transform: translateY(-1px);
  }

  /* Title block */
  .s0 .title-block {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: clamp(18px, 2.5vw, 32px);
    max-width: 784px;
    padding-bottom: clamp(24px, 6vw, 80px);
  }

  .s0 .title-block .eyebrow {
    font-weight: 500;
    font-size: clamp(15px, 1.7vw, 32px);
    line-height: 1.3;
    color: #5298dd;
  }

  .s0 .title-block .main-title {
    display: flex;
    flex-direction: column;
    gap: clamp(8px, 1vw, 16px);
  }

  .s0 .title-block .main-title h1 {
    font-weight: 700;
    font-size: clamp(28px, 4.2vw, 72px);
    line-height: 1.15;
    color: #ffffff;
    margin: 0;
  }

  .s0 .title-block .main-title .line2 {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: clamp(12px, 1.8vw, 30px);
  }

  .s0 .title-block .main-title .line2 span {
    font-weight: 700;
    font-size: clamp(28px, 4.2vw, 72px);
    line-height: 1.15;
    color: #ffffff;
    white-space: nowrap;
  }

  .s0 .title-block .main-title .line2 img {
    height: clamp(24px, 3.6vw, 62px);
    width: auto;
    object-fit: contain;
  }

  /* CTA buttons */
  .s0 .cta-group {
    display: flex;
    flex-wrap: wrap;
    gap: clamp(12px, 1.5vw, 20px);
    margin-top: clamp(16px, 3vw, 40px);
  }

  .s0 .cta-primary,
  .s0 .cta-secondary {
    display: flex;
    align-items: center;
    justify-content: center;
    width: clamp(170px, 14vw, 240px);
    height: clamp(48px, 4.5vw, 60px);
    font-weight: 500;
    font-size: clamp(14px, 1.2vw, 20px);
    text-decoration: none;
    white-space: nowrap;
  }

  .s0 .cta-primary {
    background: #5298dd;
    color: #ffffff;
  }

  .s0 .cta-secondary {
    border: 1px solid #d1d1d1;
    color: #d1d1d1;
    background: transparent;
  }

  /* Below this, a fixed aspect-ratio makes the hero too short for its
     own content, so let height grow with the copy instead. */
  @media (max-width: 720px) {
    .s0 { aspect-ratio: auto; min-height: 100svh; }
    .s0 .inner { padding-top: clamp(16px, 6vw, 32px); }
    .s0 .nav { justify-content: center; text-align: center; }
    .s0 .nav .nav-links { justify-content: center; }
    .s0 .cta-group { flex-direction: column; }
    .s0 .cta-primary,
    .s0 .cta-secondary { width: 100%; }
  }
</style>
</head>
<body>

<section class="s0">
  <img class="hri-bg" src="assets/hri-2-photo.png" alt="" />
  <div class="scrim"></div>

  <div class="inner">
    <nav class="nav">
      <img class="logo" src="assets/logo.png" alt="b:eat logo" />
      <div class="nav-links">
        <a href="#">b;eat 소개</a>
        <a href="#">AI 매장 운영</a>
        <a href="#">3 Track Client</a>
        <a href="#">도입조건</a>
        <a href="#">비트코퍼레이션</a>
        <a href="#" class="nav-cta">상담 신청 → </a>
      </div>
    </nav>

    <div class="title-block">
      <p class="eyebrow">무인 로봇 카페 최초 시작, 최다 설치</p>
      <div class="main-title">
        <h1>수익은 UP, 시간은 FREE</h1>
        <div class="line2">
          <span>AI 로봇커피</span>
          <img src="assets/logo.png" alt="b:eat" />
        </div>
      </div>
      <div class="cta-group">
        <a href="#" class="cta-primary">지금 창업 문의하기 →</a>
        <a href="#" class="cta-secondary">브랜드 소개 보기 ↓</a>
      </div>
    </div>
  </div>
</section>

</body>
</html>
